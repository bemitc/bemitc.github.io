<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Rating Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #81b64c;
            margin-bottom: 25px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-bottom: 3px solid #81b64c;
        }

        .stat-val {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }

        .stat-sub {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .status-bar {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-neutral {
            background: #3c3c3c;
            color: #aaa;
        }

        .status-positive {
            background: #225a22;
            color: #81b64c;
            border-color: #81b64c;
        }

        .status-negative {
            background: #5a2222;
            color: #ff6b6b;
            border-color: #ff6b6b;
        }

        .status-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .status-desc {
            font-size: 18px;
        }

        canvas {
            margin-top: 20px;
            height: 400px !important;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Chess Rating Tracker</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div>Current Rating</div>
                <div id="curr-rating" class="stat-val">--</div>
                <div id="last-game-stat" class="stat-sub">--</div>
            </div>
            <div class="stat-card">
                <div>Rating Range (95% confidence)</div>
                <div id="curr-rd" class="stat-val">--</div>
            </div>
        </div>

        <canvas id="ratingChart"></canvas>

        <div id="status-container" class="status-bar status-neutral">
            <div class="status-title">Performance Status (30D Comparison)</div>
            <div id="status-text" class="status-desc">Fetching Data...</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwWunCBjjmZe1KHev04Hz-W3sWRYrO6WzZDKIvgO8VVYIGJ00cNJLzWAlz9vWAaCrON/exec";

        async function fetchData() {
            try {
                const response = await fetch(API_URL, { redirect: 'follow' });
                const data = await response.json();

                data.sort((a, b) => new Date(a.date) - new Date(b.date));

                const latest = data[data.length - 1];
                const recentData = data.slice(-90);

                document.getElementById('curr-rating').innerText = latest.rating;
                document.getElementById('curr-rd').innerText = `${latest.rating - Math.round(latest.rd * 2)} - ${latest.rating + Math.round(latest.rd * 2)}`;

                const lastGameDate = new Date(latest.last_game).toLocaleDateString(undefined, {
                    month: 'short', day: 'numeric', year: 'numeric'
                });
                document.getElementById('last-game-stat').innerText = `Last played: ${lastGameDate}`;

                const statusContainer = document.getElementById('status-container');
                const statusText = document.getElementById('status-text');

                if (data.length < 30) {
                    statusContainer.className = "status-bar status-neutral";
                    statusText.innerText = `Calibrating... (${data.length}/30 days)`;
                } else {
                    const day30Ago = data[data.length - 30];

                    const currentFloor = latest.rating - (latest.rd * 2);
                    const currentCeiling = latest.rating + (latest.rd * 2);
                    const oldFloor = day30Ago.rating - (day30Ago.rd * 2);
                    const oldCeiling = day30Ago.rating + (day30Ago.rd * 2);

                    const eloDiff = latest.rating - day30Ago.rating;
                    const sign = eloDiff >= 0 ? "+" : "";

                    if (currentFloor > oldCeiling) {
                        statusContainer.className = "status-bar status-positive";
                        statusText.innerText = `Confirmed Growth (${sign}${eloDiff} pts)`;
                    } else if (currentCeiling < oldFloor) {
                        statusContainer.className = "status-bar status-negative";
                        statusText.innerText = `Confirmed Regression (${sign}${eloDiff} pts)`;
                    } else {
                        statusContainer.className = "status-bar status-neutral";
                        statusText.innerText = `Consolidating / Stable (${sign}${eloDiff} pts)`;
                    }
                }

                const labels = recentData.map(row => new Date(row.date).toLocaleDateString());
                const ratings = recentData.map(row => row.rating);
                const rds = recentData.map(row => row.rd);
                const lastGameDates = recentData.map(row => row.last_game);

                renderChart(labels, ratings, rds, lastGameDates);

            } catch (err) {
                console.error("Error loading data:", err);
                document.getElementById('status-text').innerText = "Error fetching API data";
            }
        }

function renderChart(labels, ratings, rds, lastGameDates) {
    const ctx = document.getElementById('ratingChart').getContext('2d');

    const upper95 = ratings.map((r, i) => r + (rds[i] * 2));
    const lower95 = ratings.map((r, i) => r - (rds[i] * 2));
    const upper68 = ratings.map((r, i) => r + rds[i]);
    const lower68 = ratings.map((r, i) => r - rds[i]);

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Actual Rating',
                    data: ratings,
                    borderColor: '#a3d16a',
                    backgroundColor: '#a3d16a',
                    borderWidth: 4,
                    pointBackgroundColor: '#fff',
                    pointRadius: 5,
                    fill: false,
                    order: 0
                },
                {
                    label: '68% Confidence',
                    data: upper68,
                    fill: 2, // Fills to dataset index 2 (lower68)
                    backgroundColor: 'rgba(163, 209, 106, 0.2)',
                    borderColor: 'transparent',
                    pointRadius: 0,
                    order: 1
                },
                {
                    label: 'lower68',
                    data: lower68,
                    fill: false,
                    borderColor: 'transparent',
                    pointRadius: 0,
                    order: 2
                },
                {
                    label: '95% Confidence',
                    data: upper95,
                    fill: 4, // Fills to dataset index 4 (lower95)
                    backgroundColor: 'rgba(163, 209, 106, 0.1)',
                    borderColor: 'transparent',
                    pointRadius: 0,
                    order: 3
                },
                {
                    label: 'lower95',
                    data: lower95,
                    fill: false,
                    borderColor: 'transparent',
                    pointRadius: 0,
                    order: 4
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',      // Shows the tooltip for the date/index you are hovering over
                intersect: false,   // Tooltip appears even if you aren't directly on a point
            },
            plugins: {
                legend: {
                    labels: {
                        filter: item => !item.text.includes('lower')
                    }
                },
                tooltip: {
                    enabled: true, // Ensure tooltips are explicitly turned on
                    callbacks: {
                        // Use the 'title' to show the date at the top of the tooltip
                        title: function(context) {
                            return context[0].label;
                        },
                        // This replaces the dataset labels with your custom ranges
                        label: function(context) {
                            // Only run this for the "Actual Rating" dataset (index 0) 
                            // to avoid repeating the tooltip 5 times.
                            if (context.datasetIndex !== 0) return null;

                            const index = context.dataIndex;
                            const rating = ratings[index];
                            const rd = Math.round(rds[index]);

                            const low68 = rating - rd;
                            const high68 = rating + rd;
                            const low95 = rating - (rd * 2);
                            const high95 = rating + (rd * 2);

                            return [
                                `Rating: ${rating}`,
                                `68% Range: ${low68} - ${high68} (±${rd})`,
                                `95% Range: ${low95} - ${high95} (±${rd * 2})`
                            ];
                        }
                    }
                }
            },
        }
    });
}

        fetchData();
    </script>
</body>

</html>
