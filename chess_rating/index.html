<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Rating Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #81b64c;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-bottom: 3px solid #81b64c;
        }

        .stat-val {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }

        canvas {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Chess Stats Dashboard</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div>Current Rating</div>
                <div id="curr-rating" class="stat-val">--</div>
            </div>
            <div class="stat-card">
                <div>Current RD</div>
                <div id="curr-rd" class="stat-val">--</div>
            </div>
        </div>

        <canvas id="ratingChart"></canvas>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwWunCBjjmZe1KHev04Hz-W3sWRYrO6WzZDKIvgO8VVYIGJ00cNJLzWAlz9vWAaCrON/exec";
        async function fetchData() {
            try {
                const response = await fetch(API_URL, { redirect: 'follow' });
                const data = await response.json();

                data.sort((a, b) => new Date(a.date) - new Date(b.date));

                const recentData = data.slice(-90);

                const latest = data[data.length - 1];
                document.getElementById('curr-rating').innerText = latest.rating;
                document.getElementById('curr-rd').innerText = `±${Math.round(latest.rd * 2)}`;

                const labels = recentData.map(row => new Date(row.date).toLocaleDateString());
                const ratings = recentData.map(row => row.rating);
                const rds = recentData.map(row => row.rd);

                renderChart(labels, ratings, rds);

            } catch (err) {
                console.error("Error loading data:", err);
            }
        }

        function renderChart(labels, ratings, rds) {
            const ctx = document.getElementById('ratingChart').getContext('2d');

            const upper95 = ratings.map((r, i) => r + (rds[i] * 2));
            const lower95 = ratings.map((r, i) => r - (rds[i] * 2));
            const upper68 = ratings.map((r, i) => r + rds[i]);
            const lower68 = ratings.map((r, i) => r - rds[i]);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Actual Rating',
                            data: ratings,
                            borderColor: '#81b64c',
                            borderWidth: 3,
                            pointRadius: 4,
                            fill: false,
                            zIndex: 10
                        },
                        {
                            label: '68% Confidence (±1 RD)',
                            data: upper68,
                            fill: '+1', 
                            backgroundColor: 'rgba(129, 182, 76, 0.3)',
                            borderColor: 'transparent',
                            pointRadius: 0
                        },
                        {
                            data: lower68,
                            fill: false,
                            borderColor: 'transparent',
                            pointRadius: 0
                        },
                        {
                            label: '95% Confidence (±2 RD)',
                            data: upper95,
                            fill: '+1', 
                            backgroundColor: 'rgba(129, 182, 76, 0.1)',
                            borderColor: 'transparent',
                            pointRadius: 0
                        },
                        {
                            data: lower95,
                            fill: false,
                            borderColor: 'transparent',
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    plugins: {
                        legend: { labels: { filter: (item) => !item.text.includes('undefined') } } // Hides empty labels
                    },
                    scales: {
                        y: { grid: { color: '#333' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
        fetchData();
    </script>
</body>

</html>
