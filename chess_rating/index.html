<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Rating Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #81b64c;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-bottom: 3px solid #81b64c;
        }

        .stat-val {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }

        .stat-sub {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        canvas {
            margin-top: 20px;
            height: 400px !important;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Chess Rating Tracker</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div>Current Rating</div>
                <div id="curr-rating" class="stat-val">--</div>
                <div id="last-game-stat" class="stat-sub">--</div>
            </div>
            <div class="stat-card">
                <div>Confidence Range (95%)</div>
                <div id="curr-rd" class="stat-val">--</div>
                <div class="stat-sub">±2 Standard Deviations</div>
            </div>
        </div>

        <canvas id="ratingChart"></canvas>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwWunCBjjmZe1KHev04Hz-W3sWRYrO6WzZDKIvgO8VVYIGJ00cNJLzWAlz9vWAaCrON/exec"
        
        async function fetchData() {
            try {
                const response = await fetch(API_URL, { redirect: 'follow' });
                const data = await response.json();

                data.sort((a, b) => new Date(a.date) - new Date(b.date));

                const recentData = data.slice(-90);
                const latest = data[data.length - 1];

                // Update Stats Cards
                document.getElementById('curr-rating').innerText = latest.rating;
                document.getElementById('curr-rd').innerText = `±${Math.round(latest.rd * 2)}`;
                
                const lastGameDate = new Date(latest.last_game).toLocaleDateString(undefined, { 
                    month: 'short', day: 'numeric', year: 'numeric' 
                });
                document.getElementById('last-game-stat').innerText = `Last played: ${lastGameDate}`;

                // Prepare Chart Data
                const labels = recentData.map(row => new Date(row.date).toLocaleDateString());
                const ratings = recentData.map(row => row.rating);
                const rds = recentData.map(row => row.rd);
                const lastGameDates = recentData.map(row => row.last_game);

                renderChart(labels, ratings, rds, lastGameDates);

            } catch (err) {
                console.error("Error loading data:", err);
            }
        }

        function renderChart(labels, ratings, rds, lastGameDates) {
            const ctx = document.getElementById('ratingChart').getContext('2d');

            const upper95 = ratings.map((r, i) => r + (rds[i] * 2));
            const lower95 = ratings.map((r, i) => r - (rds[i] * 2));
            const upper68 = ratings.map((r, i) => r + rds[i]);
            const lower68 = ratings.map((r, i) => r - rds[i]);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Actual Rating',
                            data: ratings,
                            borderColor: '#a3d16a',
                            backgroundColor: '#a3d16a',
                            borderWidth: 4,
                            pointBackgroundColor: '#fff',
                            pointRadius: 5,
                            fill: false,
                            order: 0
                        },
                        {
                            label: '68% Confidence (±1 RD)',
                            data: upper68,
                            fill: 2,
                            backgroundColor: 'rgba(163, 209, 106, 0.4)',
                            borderColor: '#7ba151', 
                            pointRadius: 0,
                            order: 1
                        },
                        {
                            label: 'hidden',
                            data: lower68,
                            fill: false,
                            borderColor: 'transparent',
                            pointRadius: 0,
                            order: 2
                        },
                        {
                            label: '95% Confidence (±2 RD)',
                            data: upper95,
                            fill: 4,
                            backgroundColor: 'rgba(163, 209, 106, 0.15)',
                            borderColor: '#3a4a28',
                            pointRadius: 0,
                            order: 3
                        },
                        {
                            label: 'hidden',
                            data: lower95,
                            fill: false,
                            borderColor: 'transparent',
                            pointRadius: 0,
                            order: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#ffffff',
                                usePointStyle: true,
                                pointStyle: 'rect',
                                padding: 20,
                                generateLabels: (chart) => {
                                    const original = Chart.defaults.plugins.legend.labels.generateLabels(chart);
                                    return original
                                        .filter(label => label.text !== 'hidden')
                                        .map(label => {
                                            const dataset = chart.data.datasets[label.datasetIndex];
                                            label.fillStyle = dataset.borderColor;
                                            label.strokeStyle = 'transparent';
                                            return label;
                                        });
                                }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(25, 25, 25, 0.95)',
                            titleColor: '#a3d16a',
                            filter: (item) => item.dataset.label !== 'hidden',
                            callbacks: {
                                label: function(context) {
                                    const index = context.dataIndex;
                                    const label = context.dataset.label;
                                    const rating = ratings[index];
                                    const rd = Math.round(rds[index]);

                                    if (label === '68% Confidence (±1 RD)') {
                                        return `${label}: ${Math.round(rating - rd)} - ${Math.round(rating + rd)}`;
                                    } else if (label === '95% Confidence (±2 RD)') {
                                        return `${label}: ${Math.round(rating - (rd * 2))} - ${Math.round(rating + (rd * 2))}`;
                                    }
                                    return `${label}: ${context.parsed.y}`;
                                },
                                footer: function(tooltipItems) {
                                    const index = tooltipItems[0].dataIndex;
                                    const lgDate = new Date(lastGameDates[index]).toLocaleDateString();
                                    return `Based on game(s) up to: ${lgDate}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { grid: { color: '#2a2a2a' }, ticks: { color: '#bbb' }, grace: '10%' },
                        x: { grid: { display: false }, ticks: { color: '#bbb' } }
                    }
                }
            });
        }
        fetchData();
    </script>
</body>

</html>
